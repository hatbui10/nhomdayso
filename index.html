<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Dual View: Pattern Analysis</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 20px 3px 0 3px; 
            padding: 0;
            overflow-x: hidden;
        }

        .container { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

        #file-info-badge {
            position: fixed; top: 10px; right: 10px;
            background: #2c2c2c; color: #03dac6;
            padding: 8px 15px; border-radius: 6px;
            border: 1px solid #03dac6; font-size: 13px;
            font-weight: bold; z-index: 1000;
        }

        .config-bar {
            background: #1e1e1e; padding: 10px;
            border-radius: 8px; margin-bottom: 10px;
            display: flex; align-items: center;
            gap: 15px; border: 1px solid #333; flex-wrap: wrap;
        }

        #inputText { display: none; }

        .display-box { 
            width: 100%; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px;
        }

        .output-panel { 
            height: calc(100vh - 200px); 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background-color: #181818; 
            color: #ffffff;
            box-sizing: border-box; 
            font-size: 18px; 
            overflow-y: auto; 
            overflow-x: hidden;
            word-break: break-all; 
            white-space: pre-wrap;
            letter-spacing: 2px; 
            line-height: 2.3;
        }

        /* --- MÀU 1: XEN KẼ (Ab/bA) --- */
        #alternatingOutput { border-color: #bb86fc; }
        .mark-Ab { background-color: #ffff00; color: #000; font-weight: bold; padding: 2px 0; display: inline-block; line-height: 1.2; }
        .mark-bA { background-color: #00bfff; color: #000; font-weight: bold; padding: 2px 0; display: inline-block; line-height: 1.2; }

        /* --- MÀU 2: ĐỒNG NHẤT (AAA/bbb) --- */
        #homogeneousOutput { border-color: #03dac6; }
        .mark-AAA { background-color: #ffff00; color: #000; font-weight: bold; padding: 2px 0; display: inline-block; line-height: 1.2; }
        .mark-bbb { background-color: #00bfff; color: #000; font-weight: bold; padding: 2px 0; display: inline-block; line-height: 1.2; }

        .controls { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

        button, .file-label { 
            padding: 10px 20px; cursor: pointer; border: none; 
            border-radius: 6px; background: #3700b3; color: white; 
            font-weight: bold; font-size: 13px;
        }
        
        .btn-alt { background: #bb86fc; color: #000; }
        .btn-homo { background: #03dac6; color: #000; }
        .btn-download { background: #cf6679; }

        input[type="number"] {
            padding: 5px; width: 60px; border-radius: 4px; border: 1px solid #444; background: #2c2c2c; color: #fff; text-align: center;
        }
        input[type="file"] { display: none; }
        label { font-size: 13px; color: #aaa; }
    </style>
</head>
<body>

<div id="file-info-badge">Dữ liệu: 0 số</div>

<div class="container">
    <div class="config-bar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <label>Độ dài lọc ≥</label>
            <input type="number" id="minLength" value="4" min="2" oninput="autoRefresh()">
        </div>
        
        <div style="margin-left: auto; display: flex; gap: 10px;">
            <button class="btn-alt" onclick="processAlternating()">✨ TÔ MÀU Ab/bA</button>
            <button class="btn-homo" onclick="processHomogeneous()">📊 TÔ MÀU AAA/bbb</button>
        </div>
    </div>
    
    <textarea id="inputText"></textarea>

    <div class="controls">
        <label class="file-label">📁 CHỌN FILE .TXT <input type="file" id="fileInput" accept=".txt"></label>
        <button class="btn-download" onclick="downloadFile()">💾 LƯU FILE</button>
        <button onclick="clearAll()" style="background: #444;">🗑️ XÓA DỮ LIỆU</button>
    </div>

    <div class="display-box">
        <div>
            <div style="font-size: 12px; color: #bb86fc; font-weight: bold; margin-bottom: 3px;">1. DÃY XEN KẼ (Ab / bA)</div>
            <div id="alternatingOutput" class="output-panel"></div>
        </div>
        
        <div>
            <div style="font-size: 12px; color: #03dac6; font-weight: bold; margin-bottom: 3px;">2. DÃY ĐỒNG NHẤT (AAA / bbb)</div>
            <div id="homogeneousOutput" class="output-panel"></div>
        </div>
    </div>
</div>

<script>
    const inputEl = document.getElementById('inputText');
    const altOutputEl = document.getElementById('alternatingOutput');
    const homoOutputEl = document.getElementById('homogeneousOutput');
    const minLenEl = document.getElementById('minLength');
    const infoBadge = document.getElementById('file-info-badge');

    const isA = (c) => /[0-9]/.test(c) && parseInt(c) >= 5;

    function updateBadge(text) {
        const count = text.replace(/[^0-9]/g, '').length;
        infoBadge.innerHTML = `Dữ liệu: ${count.toLocaleString()} số`;
    }

    // Tự động làm mới khi đổi số ở ô Độ dài
    function autoRefresh() {
        if (inputEl.value) {
            processAlternating();
            processHomogeneous();
        }
    }

    // 1. Logic Tô màu Ab/bA (Xen kẽ)
    function processAlternating() {
        const text = inputEl.value;
        const minLen = parseInt(minLenEl.value) || 4;
        let resultHTML = "";
        let i = 0;

        while (i < text.length) {
            if (!/[0-9]/.test(text[i])) { resultHTML += text[i++]; continue; }

            let j = i;
            let temp = text[i];
            let lastIsA = isA(text[i]);

            while (j + 1 < text.length && /[0-9]/.test(text[j + 1])) {
                let nextIsA = isA(text[j + 1]);
                if (nextIsA === lastIsA) break;
                temp += text[++j];
                lastIsA = nextIsA;
            }

            if (temp.length >= minLen) {
                let className = isA(text[i]) ? 'mark-Ab' : 'mark-bA';
                resultHTML += `<span class="${className}">${temp}</span>`;
                i = j + 1;
            } else {
                resultHTML += text[i++];
            }
        }
        altOutputEl.innerHTML = resultHTML;
        updateBadge(text);
    }

    // 2. Logic Tô màu AAA/bbb (Đồng nhất)
    function processHomogeneous() {
        const text = inputEl.value;
        const minLen = parseInt(minLenEl.value) || 4;
        let resultHTML = "";
        let i = 0;

        while (i < text.length) {
            if (!/[0-9]/.test(text[i])) { resultHTML += text[i++]; continue; }

            let j = i;
            let temp = text[i];
            let currentIsA = isA(text[i]);

            while (j + 1 < text.length && /[0-9]/.test(text[j + 1])) {
                if (isA(text[j + 1]) !== currentIsA) break;
                temp += text[++j];
            }

            if (temp.length >= minLen) {
                let className = currentIsA ? 'mark-AAA' : 'mark-bbb';
                resultHTML += `<span class="${className}">${temp}</span>`;
                i = j + 1;
            } else {
                resultHTML += text[i++];
            }
        }
        homoOutputEl.innerHTML = resultHTML;
    }

    function clearAll() {
        if(confirm("Xóa sạch dữ liệu?")) {
            inputEl.value = "";
            altOutputEl.innerHTML = "";
            homoOutputEl.innerHTML = "";
            updateBadge("");
            localStorage.removeItem('saved_dual_tool_data');
        }
    }

    function downloadFile() {
        if(!inputEl.value) return;
        const blob = new Blob([inputEl.value], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "data_analysis.txt";
        link.click();
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (f) {
            const r = new FileReader();
            r.onload = (ev) => { 
                inputEl.value = ev.target.result; 
                processAlternating();
                processHomogeneous();
                localStorage.setItem('saved_dual_tool_data', inputEl.value);
            };
            r.readAsText(f);
        }
    });

    window.onload = () => {
        const saved = localStorage.getItem('saved_dual_tool_data');
        if (saved) {
            inputEl.value = saved;
            processAlternating();
            processHomogeneous();
        }
    };
</script>
</body>
</html>
