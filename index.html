<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích - Nhấp Nháy Ô Trống</title>
    <style>
        :root {
            --bg-color: #121212; --text-color: #e0e0e0; --container-bg: #1e1e1e;
            --border-color: #333; --cell-bg: #2d2d2d; --primary-color: #3498db;
            --highlight-color: #f1c40f; --input-bg: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color);
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 20px;
        }
        .main-layout { display: flex; gap: 20px; max-width: 1350px; margin: 0 auto; flex: 1; width: 100%; overflow: hidden; }
        
        .left-panel { flex: 2; overflow-y: auto; background: var(--container-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); position: relative; }
        .log-panel { flex: 1; background: var(--container-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; }
        
        .log-title { font-weight: bold; margin-bottom: 10px; color: var(--highlight-color); border-bottom: 1px solid #444; padding-bottom: 5px; text-align: center; }
        #logList { overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .log-item { 
            padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 6px; 
            cursor: pointer; border-left: 4px solid #e74c3c; transition: 0.2s; font-size: 0.9em;
        }
        .log-item:hover { background: rgba(255,255,255,0.1); }

        #numberGrid { display: grid; grid-template-columns: repeat(3, 45px) 25px repeat(3, 45px) 40px; gap: 8px; justify-content: center; }
        .cell { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); background: var(--cell-bg); font-weight: bold; border-radius: 4px; transition: background 0.2s; }
        .cell.label { border-style: dashed; color: var(--primary-color); }
        .match-highlight { background-color: var(--highlight-color) !important; color: #000 !important; }
        .row-index { color: #666; font-size: 0.75em; display: flex; align-items: center; justify-content: center; }
        
        /* HIỆU ỨNG NHẤP NHÁY CỰC MẠNH */
        @keyframes flash-red {
            0% { background-color: var(--cell-bg); transform: scale(1); }
            50% { background-color: #ff4757; color: white; transform: scale(1.1); box-shadow: 0 0 15px #ff4757; }
            100% { background-color: var(--cell-bg); transform: scale(1); }
        }
        .blink-active {
            animation: flash-red 0.5s ease-in-out 40; /* Nháy 4 lần */
            z-index: 100;
            position: relative;
        }

        .config-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; position: sticky; top: -20px; background: var(--container-bg); padding: 10px 0; z-index: 20; }
        .rule-item input { width: 100%; padding: 5px; background: var(--input-bg); color: #fff; border: 1px solid var(--border-color); text-align: center; border-radius: 4px; }
        button { cursor: pointer; padding: 8px 15px; border: none; font-weight: bold; border-radius: 4px; background: var(--primary-color); color: white; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="left-panel">
        <div class="config-grid">
            <div class="rule-item"><label>AAA</label><input type="text" id="rule_AAA" value="AAb"></div>
            <div class="rule-item"><label>AAb</label><input type="text" id="rule_AAb" value=""></div>
            <div class="rule-item"><label>AbA</label><input type="text" id="rule_AbA" value="Abb"></div>
            <div class="rule-item"><label>Abb</label><input type="text" id="rule_Abb" value=""></div>
            <div class="rule-item"><label>bAA</label><input type="text" id="rule_bAA" value="bbb"></div>
            <div class="rule-item"><label>bAb</label><input type="text" id="rule_bAb" value=""></div>
            <div class="rule-item"><label>bbA</label><input type="text" id="rule_bbA" value=""></div>
            <div class="rule-item"><label>bbb</label><input type="text" id="rule_bbb" value=""></div>
            <button onclick="renderLogic()" style="background: #27ae60; grid-column: 1/-1; margin-top:5px;">Lưu & Chạy</button>
        </div>
        <div style="margin-bottom:15px; display:flex; gap:10px;">
            <input type="file" id="fileInput" accept=".txt" style="flex:1">
            <button onclick="localStorage.clear(); location.reload();" style="background:#e74c3c;">Xóa Hết</button>
        </div>
        <div id="numberGrid"></div>
    </div>

    <div class="log-panel">
        <div class="log-title">LOG KHOẢNG CÁCH Ô</div>
        <ul id="logList"></ul>
    </div>
</div>

<script>
    const numberGrid = document.getElementById('numberGrid');
    const logList = document.getElementById('logList');
    const patterns = ['AAA', 'AAb', 'AbA', 'Abb', 'bAA', 'bAb', 'bbA', 'bbb'];
    let rawNumbers = localStorage.getItem('savedNumbers') || "";

    window.onload = () => {
        patterns.forEach(p => {
            const saved = localStorage.getItem('rule_' + p);
            if (saved) document.getElementById('rule_' + p).value = saved;
        });
        if (rawNumbers) renderLogic();
    };

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            rawNumbers = event.target.result.replace(/\D/g, '');
            localStorage.setItem('savedNumbers', rawNumbers);
            renderLogic();
        };
        reader.readAsText(file);
    });

    function getNumType(char) { return (parseInt(char) >= 5) ? 'A' : 'b'; }

    function renderLogic() {
        patterns.forEach(p => localStorage.setItem('rule_' + p, document.getElementById('rule_' + p).value.trim()));
        numberGrid.innerHTML = ""; logList.innerHTML = "";
        
        let groups = [];
        for (let i = 0; i < rawNumbers.length; i += 3) groups.push(rawNumbers.substring(i, i + 3));

        let nextLabels = ["", "", ""];
        let lastGlobalIdx = -1, lastRow = -1, lastPos = -1;

        groups.forEach((group, rowIndex) => {
            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'cell'; div.textContent = group[i] || "-";
                numberGrid.appendChild(div);
            }
            const sep = document.createElement('div'); sep.style.width="25px"; numberGrid.appendChild(sep);

            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'cell label';
                div.id = `k-${rowIndex}-${i}`;
                div.textContent = nextLabels[i];
                
                const currentIdx = (rowIndex * 3) + (i + 1);

                if (nextLabels[i] !== "" && group[i] && getNumType(group[i]) === nextLabels[i]) {
                    div.classList.add('match-highlight');
                    
                    if (lastGlobalIdx !== -1) {
                        let dist = currentIdx - lastGlobalIdx - 1;
                        if (dist > 4) {
                            const li = document.createElement('li');
                            li.className = 'log-item';
                            li.innerHTML = `⚠️ Trống: <b>${dist} ô</b><br>Từ ô ${lastPos} dòng ${lastRow+1} đến ô ${i+1} dòng ${rowIndex+1}`;
                            
                            const startIdx = lastGlobalIdx;
                            const endIdx = currentIdx;
                            const rowToScroll = lastRow; // Cuộn về dòng bắt đầu khoảng trống

                            li.onclick = () => {
                                // Cuộn tới dòng bắt đầu khoảng trống
                                document.getElementById(`row-${rowToScroll}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
                                
                                // Xóa toàn bộ hiệu ứng cũ trước khi chạy mới
                                document.querySelectorAll('.blink-active').forEach(el => el.classList.remove('blink-active'));
                                
                                // Nhấp nháy các ô từ điểm nổ cũ ĐẾN điểm nổ mới
                                setTimeout(() => {
                                    for (let g = startIdx; g <= endIdx; g++) {
                                        let r = Math.floor((g - 1) / 3);
                                        let c = (g - 1) % 3;
                                        let cell = document.getElementById(`k-${r}-${c}`);
                                        if (cell) cell.classList.add('blink-active');
                                    }
                                }, 50); // Delay nhỏ để trình duyệt kịp vẽ lại
                            };
                            logList.appendChild(li);
                        }
                    }
                    lastGlobalIdx = currentIdx; lastRow = rowIndex; lastPos = i + 1;
                }
                numberGrid.appendChild(div);
            }

            const idx = document.createElement('div');
            idx.className = 'row-index'; idx.id = `row-${rowIndex}`;
            idx.textContent = rowIndex + 1;
            numberGrid.appendChild(idx);

            if (group.length === 3) {
                let p = ""; for(let char of group) p += getNumType(char);
                let r = document.getElementById('rule_'+p).value.trim();
                nextLabels = r.length === 3 ? r.split('') : ["","",""];
            } else { nextLabels = ["","",""]; }
        });
    }
</script>
</body>
</html>
