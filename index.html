<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích Số (A >= 5, b < 5)</title>
    <style>
        :root {
            
            --text-color: #333;
            
            --border-color: #ddd;
            --cell-bg: #fff;
            --label-bg: #f8f9fa;
            --primary-color: #4a90e2;
            --highlight-color: #ffeb3b; 
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --container-bg: #2d2d2d;
            --border-color: #444;
            --cell-bg: #3d3d3d;
            --label-bg: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .grid-header {
            display: grid;
            grid-template-columns: repeat(3, 45px) 30px repeat(3, 45px);
            gap: 8px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        #numberGrid {
            display: grid;
            grid-template-columns: repeat(3, 45px) 30px repeat(3, 45px);
            gap: 8px;
        }

        .cell {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            background: var(--cell-bg);
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .cell.label {
            background-color: var(--label-bg);
            color: #555;
        }

        .match-highlight {
            background-color: var(--highlight-color) !important;
            color: #000 !important;
            border-color: #fbc02d !important;
        }

        .separator { width: 30px; }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
        }

        .info {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 5px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Trình Phân Tích Logic A-b</h2>
    
    <div class="controls">
        <input type="file" id="fileInput" accept=".txt">
        <button onclick="toggleDarkMode()">Giao diện</button>
        <button style="background:#e74c3c" onclick="clearData()">Xóa hết</button>
    </div>

    <div class="grid-header">
        <span>S1</span><span>S2</span><span>S3</span>
        <span></span>
        <span>KQ1</span><span>KQ2</span><span>KQ3</span>
    </div>
    
    <div id="numberGrid"></div>

    <div class="info">
        <strong>Quy tắc hiện tại:</strong><br>
        - <b>A</b>: Số lớn hoặc bằng 5 (5,6,7,8,9)<br>
        - <b>b</b>: Số nhỏ hơn 5 (0,1,2,3,4)<br>
        - Nếu 3 số trước có 2 <b>A</b> → Hàng sau xếp <b>b-A-A</b><br>
        - Nếu 3 số trước có 2 <b>b</b> → Hàng sau xếp <b>A-b-b</b><br>
        - Ô kết quả tự động tô vàng nếu trùng khớp với loại số cùng vị trí.
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const numberGrid = document.getElementById('numberGrid');
    let rawNumbers = localStorage.getItem('savedNumbers') || "";

    window.onload = () => {
        if (localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
        if (rawNumbers) renderLogic();
    };

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            rawNumbers = event.target.result.replace(/\D/g, '');
            localStorage.setItem('savedNumbers', rawNumbers);
            renderLogic();
        };
        reader.readAsText(file);
    });

    // HÀM KIỂM TRA LOẠI SỐ THEO ĐIỀU KIỆN MỚI
    function getNumType(char) {
        let n = parseInt(char);
        if (isNaN(n)) return null;
        return (n >= 5) ? 'A' : 'b'; 
    }

    function renderLogic() {
        numberGrid.innerHTML = "";
        const fragment = document.createDocumentFragment();
        
        let groups = [];
        for (let i = 0; i < rawNumbers.length; i += 3) {
            groups.push(rawNumbers.substring(i, i + 3));
        }

        let nextLabels = ["", "", ""]; 

        groups.forEach((group) => {
            // 1. Ô số liệu thực tế
            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'cell';
                div.textContent = group[i] || "-";
                fragment.appendChild(div);
            }

            // 2. Ngăn cách
            const sep = document.createElement('div');
            sep.className = 'separator';
            fragment.appendChild(sep);

            // 3. Ô nhãn dự đoán và tô màu
            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'cell label';
                const labelValue = nextLabels[i];
                div.textContent = labelValue;

                // Kiểm tra trùng khớp
                if (labelValue !== "" && group[i]) {
                    if (getNumType(group[i]) === labelValue) {
                        div.classList.add('match-highlight');
                    }
                }
                fragment.appendChild(div);
            }

            // 4. Tính toán cho hàng kế tiếp
            let countA = 0;
            let countB = 0;
            for (let char of group) {
                let type = getNumType(char);
                if (type === 'A') countA++;
                else if (type === 'b') countB++;
            }

            if (countA >= 2) nextLabels = ['b', 'A', 'A'];
            else if (countB >= 2) nextLabels = ['A', 'b', 'b'];
            else nextLabels = ["", "", ""];
        });

        numberGrid.appendChild(fragment);
    }

    function toggleDarkMode() {
        const isDark = document.body.hasAttribute('data-theme');
        document.body.toggleAttribute('data-theme');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    function clearData() {
        if (confirm("Xóa toàn bộ dữ liệu?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
